<!DOCTYPE html><html lang="id"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Data Grid Dashboard</title>        <!-- Tailwind CSS untuk Styling -->    <script src="https://cdn.tailwindcss.com"></script>        <!-- React & ReactDOM untuk Komponen UI -->    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>        <!-- Babel untuk menerjemahkan JSX di browser -->    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>    <style>        /* Memastikan font mono bawaan Tailwind diterapkan ke body */        body {            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;        }    </style></head><body>    <!-- Tempat aplikasi React akan dirender -->    <div id="root"></div>    <!-- Logika Aplikasi React -->    <script type="text/babel">        const { useState, useEffect, useMemo } = React;        // Konfigurasi link Google Sheets Anda        const SHEETS_CONFIG = {          project: {            id: '1xt-LyyuWpJd6xLaMv8BcbhpmtwhAEfhpmGCd0G3qW8Q',            gid: '0',            name: 'Panel Project',            icon: (              <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">                <path strokeLinecap="square" strokeLinejoin="miter" strokeWidth="2" d="M4 4h16v16H4z" />                <path strokeLinecap="square" strokeLinejoin="miter" strokeWidth="2" d="M4 12h16M12 4v16" />              </svg>            )          },          konvensional: {            id: '1KWhQ_xWwTnIofd7DL6-OtTseSvV-AdECvH2yGBZmm9Q',            gid: '0',            name: 'Panel Konvensional',            icon: (              <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">                <path strokeLinecap="square" strokeLinejoin="miter" strokeWidth="2" d="M12 2L2 12l10 10 10-10L12 2z" />              </svg>            )          }        };        // Fungsi helper untuk mengubah string tanggal menjadi Object Date        const parseDate = (str) => {          if (!str) return null;          // Format Indonesia biasa: DD/MM/YYYY HH:mm:ss          const dmyMatch = str.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})\s+(\d{1,2}):(\d{1,2}):(\d{1,2})/);          if (dmyMatch) {            return new Date(dmyMatch[3], dmyMatch[2]-1, dmyMatch[1], dmyMatch[4], dmyMatch[5], dmyMatch[6]);          }          // Coba parse standar          const d = new Date(str);          if (!isNaN(d.getTime())) return d;          return null;        };        function App() {          const [activeTab, setActiveTab] = useState('project');          const [sheetData, setSheetData] = useState({ headers: [], rows: [] });          const [loading, setLoading] = useState(false);          const [error, setError] = useState(null);          const [searchTerm, setSearchTerm] = useState('');          const [timeFilter, setTimeFilter] = useState('all'); // 'all' atau '1h'          const fetchSheetData = async (tabKey) => {            setLoading(true);            setError(null);            try {              const config = SHEETS_CONFIG[tabKey];              const url = `https://docs.google.com/spreadsheets/d/${config.id}/gviz/tq?tqx=out:json&gid=${config.gid}`;                            const response = await fetch(url);              const text = await response.text();                            const prefix = "google.visualization.Query.setResponse(";              const startIndex = text.indexOf(prefix) + prefix.length;              const endIndex = text.lastIndexOf(");");                            if (startIndex === -1 || endIndex === -1) {                throw new Error("Gagal membaca format data. Pastikan Google Sheet diset ke 'Siapa saja yang memiliki link dapat melihat' (Public).");              }              const jsonString = text.substring(startIndex, endIndex);              const data = JSON.parse(jsonString);              if (data.status === 'error') {                throw new Error(data.errors[0].detailed_message || "Error dari Google Sheets");              }              let headers = data.table.cols.map(c => c.label || "");              let rawRows = data.table.rows;              if (headers.every(h => h.trim() === "")) {                 if (rawRows.length > 0) {                    headers = rawRows[0].c.map(cell => cell ? (cell.f !== undefined ? String(cell.f) : (cell.v !== null ? String(cell.v) : "")) : "");                    rawRows = rawRows.slice(1);                 }              }              const rows = rawRows.map(row => {                return row.c.map(cell => {                  if (!cell) return "";                  return cell.f !== undefined ? String(cell.f) : (cell.v !== null ? String(cell.v) : "");                });              });              setSheetData({ headers, rows });            } catch (err) {              console.error(err);              setError(err.message || "Terjadi kesalahan saat memuat data.");            } finally {              setLoading(false);            }          };          useEffect(() => {            fetchSheetData(activeTab);          }, [activeTab]);          // Proses Filter (Search + 1 Jam Terakhir)          const filteredRows = useMemo(() => {            let result = sheetData.rows;            // Filter 1 Jam Terakhir            if (timeFilter === '1h') {              const oneHourAgo = Date.now() - (60 * 60 * 1000);              result = result.filter(row => {                // Asumsi kolom pertama (index 0) adalah waktu/timestamp                const rowDate = parseDate(row[0]);                 if (rowDate) {                  return rowDate.getTime() >= oneHourAgo;                }                // Jika format tanggal tidak dikenali, tetapkan tampil (agar data tidak hilang semua)                return true;               });            }            // Filter Pencarian            if (searchTerm.trim()) {              const lowercasedTerm = searchTerm.toLowerCase();              result = result.filter(row =>                 row.some(cellValue => String(cellValue).toLowerCase().includes(lowercasedTerm))              );            }            return result;          }, [searchTerm, sheetData.rows, timeFilter]);          return (            <div className="min-h-screen bg-amber-50 text-slate-900 relative">              {/* Background Pattern Geometri */}              <div className="fixed inset-0 z-0 pointer-events-none opacity-20" style={{ backgroundImage: 'linear-gradient(to right, #334155 1px, transparent 1px), linear-gradient(to bottom, #334155 1px, transparent 1px)', backgroundSize: '40px 40px' }}></div>              {/* Header */}              <header className="relative z-10 bg-white border-b-4 border-black">                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col sm:flex-row justify-between items-center gap-6">                  <div className="flex items-center">                    <div className="p-3 bg-rose-500 border-4 border-black shadow-[4px_4px_0_0_#000] mr-4">                      <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">                        <path strokeLinecap="square" strokeLinejoin="miter" strokeWidth="3" d="M4 4h16v16H4zM4 12h16M12 4v16" />                      </svg>                    </div>                    <div>                      <h1 className="text-2xl font-black text-black uppercase tracking-tighter">Data Grid</h1>                      <p className="text-sm font-bold text-slate-600 uppercase tracking-widest">Live Sync</p>                    </div>                  </div>                  {/* Kontrol Navigasi Tab */}                  <div className="flex gap-4 w-full sm:w-auto">                    {Object.entries(SHEETS_CONFIG).map(([key, config]) => (                      <button                        key={key}                        onClick={() => setActiveTab(key)}                        className={`flex items-center justify-center flex-1 sm:flex-none px-6 py-3 border-4 border-black font-bold uppercase tracking-wider transition-all duration-200 ${                          activeTab === key                            ? 'bg-rose-500 text-white shadow-[4px_4px_0_0_#000] translate-x-[-2px] translate-y-[-2px]'                            : 'bg-white text-black hover:bg-amber-100 shadow-[2px_2px_0_0_#000] hover:translate-x-[-1px] hover:translate-y-[-1px]'                        }`}                      >                        {config.icon}                        {config.name}                      </button>                    ))}                  </div>                </div>              </header>              <main className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">                                {loading && sheetData.rows.length === 0 ? (                  <div className="flex flex-col items-center justify-center py-32 bg-white border-4 border-black shadow-[8px_8px_0_0_#000]">                    <div className="w-16 h-16 border-8 border-black border-t-rose-500 animate-spin mb-6"></div>                    <p className="text-black font-bold uppercase tracking-widest text-lg">Menyinkronkan...</p>                  </div>                ) : error ? (                   <div className="bg-red-400 border-4 border-black shadow-[8px_8px_0_0_#000] p-8 text-center max-w-2xl mx-auto mt-10">                     <h3 className="text-2xl font-black text-black uppercase tracking-widest mb-4">Error Data</h3>                     <p className="text-black font-bold">{error}</p>                   </div>                ) : (                  <div className="flex flex-col gap-6">                                        {/* Bagian Kontrol Tabel */}                    <div className="bg-white p-6 border-4 border-black shadow-[8px_8px_0_0_#000] flex flex-col sm:flex-row justify-between items-center gap-6">                      {/* Filter Waktu */}                      <div className="flex gap-4">                        <button                           onClick={() => setTimeFilter('all')}                          className={`px-4 py-2 border-2 border-black font-bold uppercase text-sm transition-all ${timeFilter === 'all' ? 'bg-black text-white' : 'bg-white text-black hover:bg-amber-100 shadow-[2px_2px_0_0_#000]'}`}                        >                          Semua Data                        </button>                        <button                           onClick={() => setTimeFilter('1h')}                          className={`px-4 py-2 border-2 border-black font-bold uppercase text-sm flex items-center transition-all ${timeFilter === '1h' ? 'bg-emerald-400 text-black shadow-[2px_2px_0_0_#000]' : 'bg-white text-black hover:bg-amber-100 shadow-[2px_2px_0_0_#000]'}`}                        >                          {timeFilter === '1h' && <span className="w-3 h-3 border-2 border-black bg-white mr-2 animate-pulse"></span>}                          1 Jam Terakhir                        </button>                      </div>                      {/* Pencarian */}                      <div className="relative w-full sm:w-80">                        <input                          type="text"                          placeholder="CARI DATA..."                          value={searchTerm}                          onChange={(e) => setSearchTerm(e.target.value)}                          className="block w-full pl-4 pr-10 py-3 border-4 border-black bg-white text-black font-bold focus:outline-none focus:bg-amber-100 transition-colors shadow-[4px_4px_0_0_#000]"                        />                        <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">                          <svg className="h-6 w-6 text-black" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>                        </div>                      </div>                    </div>                    {/* Area Tabel Data */}                    <div className="bg-white border-4 border-black shadow-[8px_8px_0_0_#000] flex flex-col">                      <div className="overflow-x-auto overflow-y-auto max-h-[600px] w-full">                        <table className="min-w-max w-full border-collapse">                          <thead className="bg-rose-500 text-white sticky top-0 z-10 shadow-[0_4px_0_0_#000]">                            <tr>                              {sheetData.headers.map((header, idx) => (                                <th                                  key={idx}                                  className="px-6 py-4 text-left text-sm font-black uppercase tracking-wider whitespace-nowrap border-b-4 border-r-4 border-black last:border-r-0"                                >                                  {header || `Kolom ${idx + 1}`}                                </th>                              ))}                            </tr>                          </thead>                          <tbody className="bg-white">                            {filteredRows.length > 0 ? (                              filteredRows.map((row, rowIndex) => (                                <tr key={rowIndex} className="hover:bg-amber-100 transition-colors duration-150">                                  {row.map((cell, cellIndex) => (                                    <td                                      key={cellIndex}                                      className="px-6 py-3 text-sm font-medium text-black whitespace-nowrap max-w-[200px] truncate border-b-2 border-r-2 border-black last:border-r-0"                                      title={cell}                                    >                                      {cell}                                    </td>                                  ))}                                </tr>                              ))                            ) : (                              <tr>                                <td                                   colSpan={Math.max(sheetData.headers.length, 1)}                                   className="px-6 py-16 text-center font-bold text-black uppercase tracking-widest border-b-2 border-black"                                >                                  Tidak ada data                                </td>                              </tr>                            )}                          </tbody>                        </table>                      </div>                                            {/* Footer Tabel */}                      <div className="bg-white border-t-4 border-black px-6 py-4 flex justify-between items-center font-bold uppercase tracking-widest text-sm">                        <span className="text-black">                          Total: {filteredRows.length} Baris                        </span>                        {loading && <span className="text-rose-500 animate-pulse">Syncing...</span>}                      </div>                    </div>                  </div>                )}              </main>            </div>          );        }        // Render aplikasi React ke dalam div #root        const root = ReactDOM.createRoot(document.getElementById('root'));        root.render(<App />);    </script></body></html>
