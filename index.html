<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#090A0F',
                        darkCard: '#16181F',
                        darkCardSecondary: '#21242E',
                        neonGreen: '#C1FD11',
                        neonGreenDark: '#9BCB0D',
                        accentBlue: '#3B82F6',
                        accentPurple: '#A855F7',
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(193, 253, 17, 0.45)',
                        'neon-sm': '0 0 8px rgba(193, 253, 17, 0.3)',

    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel for Single File App -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Custom Style for Font & Scrollbar -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #090A0F;
            color: #FFFFFF;
        }
        /* Custom scrollbar for sleeker looks */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #090A0F;
        }
        ::-webkit-scrollbar-thumb {
            background: #21242E;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #C1FD11;
        }
    </style>
</head>
<body class="overflow-x-hidden antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Spreadsheets Details
        const SHEET_CONFIGS = {
            project: {
                id: '1xt-LyyuWpJd6xLaMv8BcbhpmtwhAEfhpmGCd0G3qW8Q',
                gid: '0',
                name: 'Panel Project',
                badge: 'Proyek Utama'
            },
            conventional: {
                id: '1KWhQ_xWwTnIofd7DL6-OtTseSvV-AdECvH2yGBZmm9Q',
                gid: '0',
                name: 'Panel Konvensional',
                badge: 'Sistem Standar'
            }
        };

        // Real-world representation based on fetched structure
        const MOCK_PROJECT_DATA = [
            { waktu: "16/06/2026 10:16:00", status: "MATI", mode: "MANUAL", arus: 0, tegangan: 0, daya: 0, energi: 0, cuaca: "803", jarakPandang: 10000, ldr: 4095, sunrise: "05:42", sunset: "17:23", alamat: "Jalan Merapi, Sukorejo", lat: "-7.629741", lon: "111.900292", firebaseTime: "10:15" },
            { waktu: "16/06/2026 10:22:58", status: "MATI", mode: "OTOMATIS", arus: 0.12, tegangan: 11.8, daya: 1.41, energi: 0.2, cuaca: "803", ldr: 3950, alamat: "Jalan Merapi, Sukorejo", firebaseTime: "10:22" },
            { waktu: "16/06/2026 11:30:15", status: "AKTIF", mode: "OTOMATIS", arus: 1.85, tegangan: 13.6, daya: 25.16, energi: 8.5, cuaca: "801", ldr: 1200, alamat: "Jalan Merapi, Sukorejo", firebaseTime: "11:30" },
            { waktu: "16/06/2026 11:45:00", status: "AKTIF", mode: "OTOMATIS", arus: 2.10, tegangan: 14.1, daya: 29.61, energi: 15.2, cuaca: "800", ldr: 3500, alamat: "Jalan Merapi, Sukorejo", firebaseTime: "11:45" },
            { waktu: "16/06/2026 12:00:00", status: "AKTIF", mode: "OTOMATIS", arus: 2.45, tegangan: 14.4, daya: 35.28, energi: 22.4, cuaca: "800", ldr: 4095, alamat: "Jalan Merapi, Sukorejo", firebaseTime: "12:00" },
            { waktu: "16/06/2026 13:15:30", status: "AKTIF", mode: "OTOMATIS", arus: 2.30, tegangan: 14.2, daya: 32.66, energi: 45.1, cuaca: "801", ldr: 3800, alamat: "Jalan Merapi, Sukorejo", firebaseTime: "13:15" },
            { waktu: "16/06/2026 14:30:22", status: "AKTIF", mode: "OTOMATIS", arus: 1.65, tegangan: 13.2, daya: 21.78, energi: 58.3, cuaca: "802", ldr: 2600, alamat: "Jalan Merapi, Sukorejo", firebaseTime: "14:30" },
            { waktu: "16/06/2026 15:45:10", status: "AKTIF", mode: "OTOMATIS", arus: 0.95, tegangan: 12.4, daya: 11.78, energi: 65.4, cuaca: "803", ldr: 1500, alamat: "Jalan Merapi, Sukorejo", firebaseTime: "15:45" },
            { waktu: "16/06/2026 16:50:00", status: "MATI", mode: "MANUAL", arus: 0, tegangan: 10.5, daya: 0, energi: 68.2, cuaca: "804", ldr: 150, alamat: "Jalan Merapi, Sukorejo", firebaseTime: "16:50" }
        ];

        const MOCK_CONVENTIONAL_DATA = [
            { waktu: "16/06/2026 10:16:00", status: "MATI", mode: "MANUAL", arus: 0, tegangan: 0, daya: 0, energi: 0, cuaca: "803", ldr: 4095, alamat: "Situs Uji B, Sukorejo", firebaseTime: "10:15" },
            { waktu: "16/06/2026 11:30:15", status: "AKTIF", mode: "MANUAL", arus: 1.10, tegangan: 11.5, daya: 12.65, energi: 4.2, cuaca: "801", ldr: 3200, alamat: "Situs Uji B, Sukorejo", firebaseTime: "11:30" },
            { waktu: "16/06/2026 12:00:00", status: "AKTIF", mode: "MANUAL", arus: 1.45, tegangan: 12.0, daya: 17.40, energi: 10.8, cuaca: "800", ldr: 4000, alamat: "Situs Uji B, Sukorejo", firebaseTime: "12:00" },
            { waktu: "16/06/2026 13:15:30", status: "AKTIF", mode: "MANUAL", arus: 1.35, tegangan: 11.8, daya: 15.93, energi: 21.3, cuaca: "801", ldr: 3100, alamat: "Situs Uji B, Sukorejo", firebaseTime: "13:15" },
            { waktu: "16/06/2026 14:30:22", status: "AKTIF", mode: "MANUAL", arus: 0.95, tegangan: 11.2, daya: 10.64, energi: 28.5, cuaca: "802", ldr: 1800, alamat: "Situs Uji B, Sukorejo", firebaseTime: "14:30" }
        ];

        function App() {
            const [selectedSheet, setSelectedSheet] = useState('project'); // 'project' or 'conventional'
            const [data, setData] = useState(MOCK_PROJECT_DATA);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [dataSource, setDataSource] = useState('fallback'); // 'live' or 'fallback'
            const [customSheetId, setCustomSheetId] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');

            // CSV Parser Helper
            const parseCSV = (text) => {
                const lines = text.split('\n');
                if (lines.length < 2) return [];
                
                // Try to detect headers
                const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                return lines.slice(1).filter(line => line.trim() !== '').map(line => {
                    const values = [];
                    let current = '';
                    let inQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            values.push(current.trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    values.push(current.trim());

                    return {
                        waktu: values[0] || 'N/A',
                        status: values[1] || 'MATI',
                        mode: values[2] || 'MANUAL',
                        arus: parseFloat(values[3]) || 0,
                        tegangan: parseFloat(values[4]) || 0,
                        daya: parseFloat(values[5]) || 0,
                        energi: parseFloat(values[6]) || 0,
                        cuaca: values[7] || '800',
                        jarakPandang: parseInt(values[8]) || 10000,
                        ldr: parseInt(values[9]) || 0, // Default 0
                        sunrise: values[10] || '05:42',
                        sunset: values[11] || '17:23',
                        alamat: values[12] || 'Situs Lapangan',
                        lat: values[13] || '-7.629',
                        lon: values[14] || '111.900',
                        firebaseTime: values[16] || values[0]?.split(' ')?.[1] || '--:--'
                    };
                });
            };

            // Fetch live data from Google Sheets
            const fetchLiveData = async (sheetType) => {
                setLoading(true);
                setError(null);
                const config = SHEET_CONFIGS[sheetType];
                const sheetId = customSheetId || config.id;
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${config.gid}`;

                try {
                    const response = await fetch(url);
                    if (!response.ok) {
                        throw new Error("Gagal mengambil data dari Google Sheets.");
                    }
                    const text = await response.text();
                    const parsed = parseCSV(text);
                    if (parsed.length === 0) {
                        throw new Error("Format data di dalam Sheet tidak cocok.");
                    }
                    setData(parsed);
                    setDataSource('live');
                } catch (err) {
                    console.warn("Koneksi gagal, menggunakan database lokal fallback:", err.message);
                    setError(err.message);
                    setData(sheetType === 'project' ? MOCK_PROJECT_DATA : MOCK_CONVENTIONAL_DATA);
                    setDataSource('fallback');
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchLiveData(selectedSheet);
            }, [selectedSheet]);

            // Latest logged row
            const latestLog = useMemo(() => {
                if (!data || data.length === 0) return {};
                return data[data.length - 1];
            }, [data]);

            // Calculate overall analytics
            const summaryStats = useMemo(() => {
                if (!data || data.length === 0) return { avgDaya: 0, peakDaya: 0, totalEnergy: 0, progressPersen: 0 };
                
                const dayas = data.map(d => d.daya).filter(val => !isNaN(val));
                const totalEnergy = data[data.length - 1]?.energi || dayas.reduce((acc, curr) => acc + curr, 0) * 0.016;
                const peakDaya = Math.max(...dayas, 0);
                const avgDaya = dayas.reduce((acc, c) => acc + c, 0) / (dayas.length || 1);
                
                const targetKekuatan = 100; // Wh target harian
                const progressPersen = Math.min(Math.round((totalEnergy / targetKekuatan) * 100), 100);

                return {
                    avgDaya: avgDaya.toFixed(2),
                    peakDaya: peakDaya.toFixed(2),
                    totalEnergy: totalEnergy.toFixed(3),
                    progressPersen
                };
            }, [data]);

            // Filtered history log
            const filteredData = useMemo(() => {
                if (!searchTerm) return [...data].reverse();
                return [...data].filter(item => 
                    item.waktu.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.status.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.mode.toLowerCase().includes(searchTerm.toLowerCase())
                ).reverse();
            }, [data, searchTerm]);

            // Simple SVG Chart data generation
            const svgChartPoints = useMemo(() => {
                if (!data || data.length < 2) return '';
                const width = 500;
                const height = 120;
                const padding = 15;
                
                const maxDaya = Math.max(...data.map(d => d.daya), 5);
                const stepX = (width - padding * 2) / (data.length - 1);
                
                return data.map((d, index) => {
                    const x = padding + index * stepX;
                    const y = height - padding - ((d.daya / maxDaya) * (height - padding * 2));
                    return { x, y, val: d.daya, time: d.firebaseTime };
                });
            }, [data]);

            // LDR Status Interpreter (Updated: 0 = Gelap Gulita, 4095 = Sangat Terang)
            const getLdrStatus = (ldrVal) => {
                const val = parseInt(ldrVal);
                if (isNaN(val)) return 'N/A';
                if (val < 1000) return 'Gelap Gulita';
                if (val < 2200) return 'Redup / Mendung';
                if (val < 3500) return 'Cerah / Terang';
                return 'Sangat Terang';
            };

            // Helper for weather icons
            const getWeatherIcon = (id) => {
                const code = parseInt(id) || 800;
                if (code === 800) return <i data-lucide="sun" class="w-6 h-6 text-yellow-400"></i>;
                if (code > 800 && code < 805) return <i data-lucide="cloud-sun" class="w-6 h-6 text-gray-300"></i>;
                return <i data-lucide="cloud-rain" class="w-6 h-6 text-blue-400"></i>;
            };

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [data, selectedSheet, dataSource, loading, showSettings]);

            return (
                <div class="min-h-screen pb-16 bg-darkBg text-gray-100 flex flex-col justify-between">
                    
                    {/* Header Panel */}
                    <header class="px-6 py-5 flex items-center justify-between border-b border-gray-800 bg-darkBg/90 backdrop-blur sticky top-0 z-40">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-xl bg-neonGreen flex items-center justify-center shadow-neon">
                                <i data-lucide="zap" class="w-5 h-5 text-darkBg stroke-[2.5]"></i>
                            </div>
                            <div>
                                <h1 class="font-extrabold text-xl tracking-tight flex items-center gap-1.5">
                                    PJU Track <span class="text-xs bg-[#21242E] text-neonGreen font-medium px-2 py-0.5 rounded-full border border-neonGreen/20">v1.4</span>
                                </h1>
                                <p class="text-xs text-gray-400">Sistem Tracker Penerangan Jalan Umum</p>
                            </div>
                        </div>

                        <div class="flex items-center space-x-2">
                            <span class={`text-[10px] uppercase tracking-wider font-bold px-2.5 py-1 rounded-full border transition-all ${
                                dataSource === 'live' 
                                    ? 'bg-neonGreen/10 text-neonGreen border-neonGreen/30' 
                                    : 'bg-amber-500/10 text-amber-400 border-amber-500/20'
                            }`}>
                                {dataSource === 'live' ? '● Real-time Sheet' : '● Demo Offline'}
                            </span>

                            <button 
                                onClick={() => setShowSettings(!showSettings)}
                                class="p-2 rounded-lg bg-darkCard hover:bg-darkCardSecondary transition border border-gray-800 text-gray-300"
                                title="Pengaturan Spreadsheet"
                            >
                                <i data-lucide="settings" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </header>

                    {/* Main Container */}
                    <main class="max-w-md mx-auto w-full px-4 pt-6 space-y-6">
                        
                        {/* Selector Tabs (Gaya Budggt. tab modern) */}
                        <div class="bg-darkCard p-1 rounded-2xl border border-gray-800/80 flex">
                            <button
                                onClick={() => setSelectedSheet('project')}
                                class={`flex-1 py-3 text-sm font-semibold rounded-xl transition-all flex items-center justify-center gap-2 ${
                                    selectedSheet === 'project' 
                                        ? 'bg-darkCardSecondary text-neonGreen border border-gray-700/50 shadow-sm' 
                                        : 'text-gray-400 hover:text-white'
                                }`}
                            >
                                <i data-lucide="layers" class="w-4 h-4"></i>
                                {SHEET_CONFIGS.project.name}
                            </button>
                            <button
                                onClick={() => setSelectedSheet('conventional')}
                                class={`flex-1 py-3 text-sm font-semibold rounded-xl transition-all flex items-center justify-center gap-2 ${
                                    selectedSheet === 'conventional' 
                                        ? 'bg-darkCardSecondary text-neonGreen border border-gray-700/50 shadow-sm' 
                                        : 'text-gray-400 hover:text-white'
                                }`}
                            >
                                <i data-lucide="compass" class="w-4 h-4"></i>
                                {SHEET_CONFIGS.conventional.name}
                            </button>
                        </div>

                        {/* Error Warning */}
                        {error && (
                            <div class="bg-amber-950/20 border border-amber-500/30 rounded-xl p-3.5 text-xs text-amber-200 flex items-start space-x-2.5">
                                <i data-lucide="alert-triangle" class="w-5 h-5 text-amber-400 flex-shrink-0 mt-0.5"></i>
                                <div class="space-y-1">
                                    <span class="font-semibold block">Tautan Google Sheet Privat</span>
                                    <p class="text-gray-300">Menampilkan database lokal simulasi presisi tinggi. Pastikan dokumen Anda sudah dipublikasikan ke web dalam format CSV.</p>
                                </div>
                            </div>
                        )}

                        {/* Settings Modal/Box */}
                        {showSettings && (
                            <div class="bg-darkCard rounded-2xl border border-gray-700/50 p-5 space-y-4">
                                <div class="flex items-center justify-between">
                                    <h3 class="text-sm font-bold text-neonGreen flex items-center gap-2">
                                        <i data-lucide="database" class="w-4 h-4"></i> Integrasi Google Spreadsheet
                                    </h3>
                                    <button onClick={() => setShowSettings(false)} class="text-gray-400 hover:text-white text-xs">Tutup</button>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs text-gray-400 block">ID Dokumen Kustom ({selectedSheet === 'project' ? 'Project' : 'Konvensional'})</label>
                                    <input 
                                        type="text" 
                                        placeholder="Masukkan Spreadsheet ID anda..." 
                                        value={customSheetId}
                                        onChange={(e) => setCustomSheetId(e.target.value)}
                                        class="w-full bg-darkBg border border-gray-700 rounded-xl px-3.5 py-2.5 text-xs text-white focus:outline-none focus:ring-1 focus:ring-neonGreen"
                                    />
                                </div>
                                <div class="flex space-x-2">
                                    <button 
                                        onClick={() => fetchLiveData(selectedSheet)}
                                        class="flex-1 bg-neonGreen text-darkBg text-xs font-bold py-2.5 rounded-xl transition hover:bg-neonGreenDark flex items-center justify-center gap-1.5 shadow-neon-sm"
                                    >
                                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Hubungkan Baru
                                    </button>
                                    <button 
                                        onClick={() => {
                                            setCustomSheetId('');
                                            setDataSource('fallback');
                                            setData(selectedSheet === 'project' ? MOCK_PROJECT_DATA : MOCK_CONVENTIONAL_DATA);
                                            setError(null);
                                        }}
                                        class="px-3 bg-darkCardSecondary text-gray-300 text-xs py-2.5 rounded-xl hover:text-white"
                                    >
                                        Reset Default
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* MAIN ESTIMASI CARD (Identical style to Rp53.060.114 Aset widget) */}
                        <div class="bg-darkCard rounded-[32px] p-7 border border-gray-800/80 shadow-2xl relative overflow-hidden">
                            {/* Abstract glowing backgrounds */}
                            <div class="absolute -top-16 -right-16 w-36 h-36 rounded-full bg-neonGreen/10 blur-[50px] pointer-events-none"></div>
                            
                            <div class="flex items-center justify-between text-xs text-gray-400 mb-1.5">
                                <span class="flex items-center tracking-wider font-semibold uppercase gap-1.5">
                                    <span class="w-2.5 h-2.5 rounded-full bg-neonGreen animate-pulse"></span>
                                    Daya Keluaran Saat Ini
                                </span>
                                <span class="text-[11px] font-mono bg-darkCardSecondary px-2.5 py-1 rounded-full text-gray-300">
                                    Log: {latestLog.firebaseTime || '--:--'}
                                </span>
                            </div>

                            {/* Main Giant Metric */}
                            <div class="text-[42px] font-extrabold tracking-tight text-white leading-none my-3 select-none flex items-baseline gap-1">
                                {latestLog.daya !== undefined ? latestLog.daya : 0} <span class="text-2xl font-semibold text-neonGreen">W</span>
                            </div>

                            {/* Mini runway indicator from image (9.9 Bulan box) */}
                            <div class="mt-4 inline-flex items-center bg-darkCardSecondary/80 border border-gray-800 rounded-2xl px-3.5 py-2 gap-3">
                                <div class="w-8 h-8 rounded-lg bg-neonGreen flex items-center justify-center">
                                    <i data-lucide="battery-charging" class="w-4 h-4 text-darkBg stroke-[2.5]"></i>
                                </div>
                                <div>
                                    <div class="text-[10px] text-gray-400 uppercase tracking-widest font-bold leading-none mb-0.5">Total Energi</div>
                                    <div class="text-sm font-extrabold text-white">
                                        {summaryStats.totalEnergy} <span class="text-[10px] font-bold text-neonGreen">Wh</span>
                                    </div>
                                </div>
                            </div>

                            {/* Current Level section (Target Berikutnya Rp42.000.000) */}
                            <div class="border-t border-gray-800/80 mt-6 pt-5 flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="w-9 h-9 rounded-full bg-[#21242E] flex items-center justify-center text-neonGreen border border-gray-700/60">
                                        <i data-lucide="shield" class="w-4 h-4"></i>
                                    </div>
                                    <div>
                                        <div class="text-[10px] text-gray-400 uppercase font-semibold leading-none">STATUS & MODE</div>
                                        <div class="text-sm font-bold text-white mt-1 flex items-center gap-1.5">
                                            {/* Updated: Status MATI is converted to 'Standby' */}
                                            {latestLog.status === 'AKTIF' ? 'Aktif' : 'Standby'}
                                            <span class="text-xs font-medium text-gray-400">({latestLog.mode})</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <div class="text-[10px] text-gray-400 uppercase font-semibold">TARGET HARIAN</div>
                                    <div class="text-sm font-extrabold text-neonGreen mt-1">100.000 Wh</div>
                                </div>
                            </div>

                            {/* Progress bar level berikutnya */}
                            <div class="mt-5 space-y-1.5">
                                <div class="flex justify-between text-[10px] text-gray-400 font-bold tracking-wider uppercase">
                                    <span>Efisiensi Pengisian</span>
                                    <span class="text-neonGreen">{summaryStats.progressPersen}%</span>
                                </div>
                                <div class="h-2 w-full bg-darkBg rounded-full overflow-hidden border border-gray-800">
                                    <div 
                                        class="h-full bg-neonGreen rounded-full transition-all duration-700 relative"
                                        style={{ width: `${summaryStats.progressPersen}%` }}
                                    >
                                        <div class="absolute inset-0 bg-white/30 animate-pulse"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* THREE DYNAMIC ASSET CARDS (Sub-widgets like Dompet & Akun from design) */}
                        <div class="grid grid-cols-2 gap-4">
                            
                            {/* Tegangan Card */}
                            <div class="bg-darkCard p-4 rounded-[24px] border border-gray-800/80 relative overflow-hidden">
                                <div class="absolute top-3 right-3">
                                    <span class="w-2.5 h-2.5 rounded-full bg-accentPurple inline-block shadow-[0_0_8px_rgba(168,85,247,0.5)]"></span>
                                </div>
                                <div class="text-[10px] text-gray-400 font-semibold tracking-wider uppercase">TEGANGAN</div>
                                <div class="text-xl font-extrabold text-white mt-2 mb-1">
                                    {latestLog.tegangan !== undefined ? latestLog.tegangan : 0} <span class="text-xs text-accentPurple font-semibold">V</span>
                                </div>
                                <p class="text-[9px] text-gray-400 leading-tight">Potensi beda gerak arus listrik masuk baterai.</p>
                            </div>

                            {/* Arus Card */}
                            <div class="bg-darkCard p-4 rounded-[24px] border border-gray-800/80 relative overflow-hidden">
                                <div class="absolute top-3 right-3">
                                    <span class="w-2.5 h-2.5 rounded-full bg-accentBlue inline-block shadow-[0_0_8px_rgba(59,130,246,0.5)]"></span>
                                </div>
                                <div class="text-[10px] text-gray-400 font-semibold tracking-wider uppercase">ARUS LISTRIK</div>
                                <div class="text-xl font-extrabold text-white mt-2 mb-1">
                                    {latestLog.arus !== undefined ? latestLog.arus : 0} <span class="text-xs text-accentBlue font-semibold">A</span>
                                </div>
                                <p class="text-[9px] text-gray-400 leading-tight">Laju pergerakan muatan elektron dinamis.</p>
                            </div>

                            {/* LDR Value Card (UPDATED LIGHT VALUE LOGIC) */}
                            <div class="bg-darkCard p-4 rounded-[24px] border border-gray-800/80 relative overflow-hidden col-span-2">
                                <div class="flex justify-between items-center">
                                    <div>
                                        <div class="text-[10px] text-gray-400 font-semibold tracking-wider uppercase">SENSOR INTENSITAS CAHAYA (LDR)</div>
                                        <div class="text-2xl font-black text-white mt-1">
                                            {latestLog.ldr !== undefined ? latestLog.ldr : 0}
                                            <span class="text-xs font-semibold text-gray-400 ml-1.5">
                                                ({getLdrStatus(latestLog.ldr)})
                                            </span>
                                        </div>
                                    </div>
                                    <div class="w-10 h-10 rounded-xl bg-darkCardSecondary flex items-center justify-center">
                                        <i data-lucide="eye" class="w-5 h-5 text-neonGreen"></i>
                                    </div>
                                </div>
                                {/* Bar matches the logic: 4095 is 100% full (very bright), 0 is 0% (pitch black) */}
                                <div class="mt-3 h-1.5 w-full bg-darkBg rounded-full overflow-hidden border border-gray-850">
                                    <div 
                                        class="h-full bg-neonGreen/80 transition-all duration-500"
                                        style={{ width: `${Math.max(0, Math.min(100, (latestLog.ldr / 40.95)))}%` }}
                                    ></div>
                                </div>
                                <div class="flex justify-between text-[8px] text-gray-500 mt-1">
                                    <span>0 (Gelap Gulita)</span>
                                    <span>4095 (Cerah)</span>
                                </div>
                            </div>
                        </div>

                        {/* LINE GRAPH REPRESENTATION */}
                        <div class="bg-darkCard rounded-3xl p-5 border border-gray-800/80">
                            <div class="flex items-center justify-between mb-4">
                                <div>
                                    <h4 class="text-xs font-bold uppercase text-gray-400 tracking-wider">Grafik Trend Daya (W)</h4>
                                    <p class="text-[10px] text-neonGreen">Berdasarkan waktu log sistem</p>
                                </div>
                                <span class="text-[10px] bg-darkCardSecondary text-gray-300 font-mono px-2 py-0.5 rounded-md border border-gray-800">
                                    Max: {summaryStats.peakDaya} W
                                </span>
                            </div>

                            {/* SVG Chart */}
                            {svgChartPoints ? (
                                <div class="relative w-full">
                                    <svg viewBox="0 0 500 120" class="w-full overflow-visible">
                                        <defs>
                                            <linearGradient id="neonGlow" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="0%" stop-color="#C1FD11" stop-opacity="0.3" />
                                                <stop offset="100%" stop-color="#C1FD11" stop-opacity="0" />
                                            </linearGradient>
                                        </defs>
                                        {/* Chart Path Area */}
                                        <path 
                                            d={`M ${svgChartPoints[0].x} 105 L ${svgChartPoints.map(p => `${p.x} ${p.y}`).join(' L ')} L ${svgChartPoints[svgChartPoints.length-1].x} 105 Z`}
                                            fill="url(#neonGlow)"
                                        />
                                        {/* Line path */}
                                        <path 
                                            d={svgChartPoints.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ')} 
                                            fill="none" 
                                            stroke="#C1FD11" 
                                            stroke-width="2.5" 
                                            stroke-linecap="round"
                                        />
                                        {/* Reference baseline */}
                                        <line x1="15" y1="105" x2="485" y2="105" stroke="#21242E" stroke-width="1" />
                                        {/* Interactive Circles / Dots */}
                                        {svgChartPoints.map((p, i) => (
                                            <g key={i} class="group/point">
                                                <circle 
                                                    cx={p.x} 
                                                    cy={p.y} 
                                                    r={i === svgChartPoints.length - 1 ? "5" : "3.5"} 
                                                    fill={i === svgChartPoints.length - 1 ? "#C1FD11" : "#16181F"}
                                                    stroke="#C1FD11"
                                                    stroke-width="1.5"
                                                />
                                                <text 
                                                    x={p.x} 
                                                    y={p.y - 8} 
                                                    text-anchor="middle" 
                                                    fill="#FFFFFF" 
                                                    font-size="8" 
                                                    class="opacity-0 group-hover/point:opacity-100 transition-opacity font-bold"
                                                >
                                                    {p.val}W
                                                </text>
                                            </g>
                                        ))}
                                    </svg>
                                    <div class="flex justify-between text-[8px] text-gray-500 font-mono mt-1 px-3">
                                        <span>{svgChartPoints[0].time}</span>
                                        <span>{svgChartPoints[Math.floor(svgChartPoints.length / 2)]?.time}</span>
                                        <span>{svgChartPoints[svgChartPoints.length - 1].time}</span>
                                    </div>
                                </div>
                            ) : (
                                <div class="h-24 flex items-center justify-center text-xs text-gray-500">
                                    Sedang mengolah statistik data grafik...
                                </div>
                            )}
                        </div>

                        {/* ENVIRONMENT DETAILS & WEATHER (ID Cuaca, Alamat, Sunrise, Sunset) */}
                        <div class="bg-darkCard rounded-3xl p-5 border border-gray-800/80 space-y-4">
                            <h4 class="text-xs font-bold uppercase text-gray-400 tracking-wider flex items-center gap-1.5">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5 text-neonGreen"></i>
                                Informasi Lingkungan & Lokasi PJU
                            </h4>

                            <div class="grid grid-cols-2 gap-3 bg-darkBg p-3 rounded-2xl border border-gray-800/50">
                                <div>
                                    <div class="text-[9px] text-gray-500 font-semibold uppercase">Sunrise</div>
                                    <div class="text-xs font-bold text-gray-200 mt-0.5">{latestLog.sunrise || '--:--'} WIB</div>
                                </div>
                                <div>
                                    <div class="text-[9px] text-gray-500 font-semibold uppercase">Sunset</div>
                                    <div class="text-xs font-bold text-gray-200 mt-0.5">{latestLog.sunset || '--:--'} WIB</div>
                                </div>
                            </div>

                            <div class="flex items-start space-x-3 bg-darkBg p-3 rounded-2xl border border-gray-800/50">
                                <div class="w-9 h-9 rounded-xl bg-darkCardSecondary flex items-center justify-center flex-shrink-0">
                                    {getWeatherIcon(latestLog.cuaca)}
                                </div>
                                <div class="space-y-0.5">
                                    <div class="text-[9px] text-gray-500 font-bold uppercase">Status Cuaca Terbaca</div>
                                    <p class="text-xs text-gray-200">
                                        ID Cuaca: <span class="font-bold text-neonGreen">{latestLog.cuaca || '800'}</span> - Jarak Pandang {latestLog.jarakPandang || '10.000'}m
                                    </p>
                                </div>
                            </div>

                            <div class="p-3 bg-darkBg rounded-2xl border border-gray-800/50 text-[11px] text-gray-400 space-y-1">
                                <div class="text-[9px] text-gray-500 font-bold uppercase">ALAMAT SISTEM PJU</div>
                                <p class="text-white font-medium">{latestLog.alamat || 'Tidak Terdeteksi'}</p>
                                <div class="text-[9px] text-neonGreen font-mono mt-1">
                                    Lat: {latestLog.lat || '--'} | Lon: {latestLog.lon || '--'}
                                </div>
                            </div>
                        </div>

                        {/* DATA HISTORY TABLE & LOGS PANEL */}
                        <div class="bg-darkCard rounded-3xl p-5 border border-gray-800/80 space-y-4">
                            <div class="flex items-center justify-between">
                                <div>
                                    <h4 class="text-xs font-bold uppercase text-gray-400 tracking-wider">Log Riwayat PJU Sheet</h4>
                                    <p class="text-[9px] text-gray-500">Tabel entri riwayat urutan terbaru</p>
                                </div>
                                <div class="relative w-32">
                                    <input 
                                        type="text" 
                                        placeholder="Cari..." 
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        class="w-full bg-darkBg border border-gray-800 rounded-lg pl-6 pr-2 py-1 text-[10px] text-white focus:outline-none focus:border-neonGreen"
                                    />
                                    <i data-lucide="search" class="w-3 h-3 text-gray-500 absolute left-2 top-2"></i>
                                </div>
                            </div>

                            <div class="space-y-2.5 max-h-[300px] overflow-y-auto pr-1">
                                {filteredData.map((item, index) => (
                                    <div key={index} class="bg-darkBg p-3 rounded-xl border border-gray-800/80 hover:border-gray-700 transition flex justify-between items-center text-xs">
                                        <div class="space-y-1">
                                            <div class="text-white font-semibold flex items-center gap-1.5">
                                                <span>{item.daya} W</span>
                                                <span class={`text-[8px] font-bold px-1.5 py-0.2 rounded-full ${
                                                    item.status === 'AKTIF' ? 'bg-neonGreen/10 text-neonGreen' : 'bg-gray-800 text-gray-400'
                                                }`}>
                                                    {item.status === 'AKTIF' ? 'Aktif' : 'Standby'}
                                                </span>
                                            </div>
                                            <div class="text-[9px] text-gray-500 font-mono">{item.waktu}</div>
                                        </div>
                                        <div class="text-right space-y-1">
                                            <div class="text-gray-300 font-mono font-bold">{item.tegangan}V / {item.arus}A</div>
                                            <div class="text-[9px] text-neonGreen">{item.mode}</div>
                                        </div>
                                    </div>
                                ))}

                                {filteredData.length === 0 && (
                                    <div class="text-center py-6 text-xs text-gray-500">
                                        Data tidak ditemukan...
                                    </div>
                                )}
                            </div>
                        </div>

                    </main>

                    {/* FOOTER BAR */}
                    <footer class="mt-8 border-t border-gray-900 bg-darkBg/95 py-6 text-center text-xs text-gray-500">
                        <p>© 2026 PJU Track Dashboard • Terkoneksi ke Google Sheets</p>
                        <p class="text-[10px] text-gray-600 mt-1">Sistem Pemantauan Panel Surya PJU Dinamis</p>
                    </footer>

                </div>
            );
        }

        // Render React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
